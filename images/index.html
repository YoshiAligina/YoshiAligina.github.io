<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoshita's Portfolio - Vintage Stamp Collection</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --paper-light: #f5ebe0;
      --paper-dark: #ede4d3;
      --title: #8b6b6b;
      --ink: #3b3028;
      --focus: #8b5a5a;
      --shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      --shadow-strong: 0 12px 24px rgba(0, 0, 0, 0.25);
      --page-turn: 600ms;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, Garamond, serif;
      background: radial-gradient(circle at 50% 45%, var(--paper-light) 0%, var(--paper-dark) 65%, #e2d6c4 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 24px;
    }

    /* Subtle paper grain and vignette */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse at center, rgba(0, 0, 0, 0.06) 0%, rgba(0, 0, 0, 0) 60%),
        repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.02) 0, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 3px),
        repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.02) 0, rgba(0, 0, 0, 0.02) 1px, transparent 1px, transparent 4px);
      mix-blend-mode: multiply;
      opacity: 0.55;
      z-index: 0;
    }

    #root { width: 100%; z-index: 1; }

    .album {
      max-width: 1280px;
      min-height: 82vh;
      margin: 0 auto;
      position: relative;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(150, 125, 100, 0.08));
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
      border-radius: 12px;
      overflow: hidden;
      perspective: 1600px;
    }

    .page {
      position: relative;
      width: 100%;
      min-height: 82vh;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0)) ,
                  linear-gradient(120deg, rgba(210, 190, 170, 0.12), rgba(255, 255, 255, 0.12));
      padding: 48px 56px 64px;
      transform-style: preserve-3d;
      transform-origin: 50% 50%;
      transition: transform var(--page-turn) cubic-bezier(0.645, 0.045, 0.355, 1), opacity var(--page-turn) ease;
      backface-visibility: hidden;
    }

    .page.turning.forward { transform: rotateY(-90deg); opacity: 0; }
    .page.turning.backward { transform: rotateY(90deg); opacity: 0; }

    .page-content { position: relative; z-index: 1; }

    .title {
      text-align: center;
      margin: 0 0 28px;
      font-size: clamp(2.4rem, 3vw, 3.4rem);
      letter-spacing: 0.02em;
      color: var(--title);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 16px;
      position: relative;
      min-height: 60vh;
    }

    .profile-stamp {
      position: relative;
      width: 200px;
      height: 240px;
      margin: 12px auto 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(230, 215, 195, 0.8));
      border: 2px solid rgba(90, 70, 50, 0.45);
      border-radius: 8px;
      box-shadow: var(--shadow);
      transform: rotate(-2deg);
      overflow: hidden;
      opacity: 0;
      animation: profileFade 0.8s ease forwards 0.1s;
    }

    .profile-stamp::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px double rgba(70, 50, 40, 0.5);
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(220, 205, 190, 0.6));
    }

    .profile-photo {
      position: absolute;
      inset: 16px;
      background: url('https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=600&q=80') center/cover;
      border: 1px solid rgba(50, 40, 30, 0.4);
      border-radius: 4px;
      filter: sepia(0.35) contrast(0.95) saturate(0.8);
    }

    @keyframes profileFade {
      from { opacity: 0; transform: translateY(-24px) rotate(-2deg); }
      to { opacity: 1; transform: translateY(0) rotate(-2deg); }
    }

    .stamp-field {
      position: relative;
      min-height: 60vh;
    }

    .stamp-button {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      position: absolute;
      opacity: 0;
      transform: translateY(-40px) rotate(var(--rotation, 0deg));
      transition: transform 0.35s ease, filter 0.35s ease, z-index 0s linear, opacity 0.35s ease;
      animation: stampEnter 0.8s ease-out forwards;
    }

    .stamp-button.loaded { opacity: 1; }

    .stamp-button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 8px;
      border-radius: 6px;
    }

    .stamp-button:hover {
      transform: rotate(var(--rotation, 0deg)) translateY(-12px) scale(1.08);
      z-index: 999 !important;
    }

    .stamp-button:hover .stamp-image { filter: drop-shadow(var(--shadow-strong)) brightness(1.05); }

    .stamp-button:active {
      transform: rotate(var(--rotation, 0deg)) translateY(3px) scale(0.96);
    }

    .stamp-image {
      width: 100%;
      height: auto;
      display: block;
      filter: drop-shadow(var(--shadow));
      transition: filter 0.35s ease;
      pointer-events: none;
      border-radius: 2px;
    }

    .stamp-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: rgba(62, 39, 35, 0.95);
      color: #faf7f2;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
    }

    .stamp-button:hover .stamp-tooltip { opacity: 1; transform: translateX(-50%) translateY(-14px); }

    @keyframes stampEnter {
      0% { opacity: 0; transform: translateY(-40px) rotate(calc(var(--rotation, 0deg) + 10deg)); }
      65% { transform: translateY(6px) rotate(calc(var(--rotation, 0deg) - 2deg)); }
      100% { opacity: 1; transform: translateY(0) rotate(var(--rotation, 0deg)); }
    }

    .inner-page {
      max-width: 820px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 10px;
      padding: 28px 32px 32px;
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
      backdrop-filter: blur(1px);
    }

    .back-button {
      background: none;
      border: 1px solid rgba(0, 0, 0, 0.25);
      color: var(--ink);
      padding: 10px 16px;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .back-button:hover { transform: translateY(-2px); box-shadow: var(--shadow-strong); background: rgba(255, 255, 255, 0.7); }
    .back-button:active { transform: translateY(1px); }
    .back-button:focus-visible { outline: 3px solid var(--focus); outline-offset: 6px; }

    .section-title { margin: 18px 0 8px; font-size: 1.25rem; color: #5b4637; }
    .section-body { line-height: 1.7; font-size: 1rem; }
    .bullet-list { padding-left: 18px; margin: 8px 0 0; }
    .bullet-list li { margin-bottom: 6px; }

    /* Responsive adjustments */
    @media (max-width: 1023px) {
      .layout { grid-template-columns: 1fr; }
      .stamp-field { min-height: 70vh; }
      .profile-stamp { margin-bottom: 24px; }
    }

    @media (max-width: 767px) {
      .page { padding: 28px 20px 36px; }
      .title { font-size: clamp(2rem, 6vw, 2.6rem); }
      .stamp-button { position: relative; display: block; margin: 0 auto 18px; transform: rotate(var(--rotation, 0deg)); }
      .stamp-field { min-height: auto; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0ms !important; }
      .page { transition: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    const STAMPS = [
      { id: 'stamp1', image: 'S1.png', label: 'About Me', page: 'about', position: { top: '15%', left: '35%' }, rotation: -8, zIndex: 3, width: '160px' },
      { id: 'stamp2', image: 'S2.png', label: 'Resume', page: 'resume', position: { top: '10%', left: '55%' }, rotation: 5, zIndex: 5, width: '180px' },
      { id: 'stamp3', image: 'S3.png', label: 'Projects', page: 'projects', position: { top: '35%', left: '30%' }, rotation: -12, zIndex: 2, width: '140px' },
      { id: 'stamp4', image: 'S4.png', label: 'Featured Work', page: 'featured', position: { top: '30%', left: '50%' }, rotation: 3, zIndex: 7, width: '160px' },
      { id: 'stamp5', image: 'S5.png', label: 'Case Studies', page: 'cases', position: { top: '25%', left: '70%' }, rotation: -6, zIndex: 4, width: '160px' },
      { id: 'stamp6', image: 'S6.png', label: 'Writing', page: 'writing', position: { top: '55%', left: '40%' }, rotation: 8, zIndex: 6, width: '180px' },
      { id: 'stamp7', image: 's7.png', label: 'Research', page: 'research', position: { top: '60%', left: '60%' }, rotation: -4, zIndex: 8, width: '160px' },
      { id: 'stamp8', image: 's8.png', label: 'Photography', page: 'photo', position: { top: '50%', left: '75%' }, rotation: 10, zIndex: 1, width: '140px' },
      { id: 'stamp9', image: 's9.png', label: 'Contact', page: 'contact', position: { top: '70%', left: '50%' }, rotation: -7, zIndex: 9, width: '160px' }
    ];

    const PAGE_CONTENT = {
      about: {
        title: 'About Me',
        sections: [
          { heading: 'Story', body: 'Designer and developer crafting tactile digital experiences inspired by analog artifacts, with a special love for Japanese philatelic history.' },
          { heading: 'Focus', bullets: ['Interactive storytelling', 'UI with archival textures', 'Motion with purpose', 'Design systems with soul'] },
        ],
      },
      resume: {
        title: 'Resume',
        sections: [
          { heading: 'Recent Roles', bullets: ['Product Designer — Atelier Studio (2022–Now)', 'Front-End Engineer — Kumo Labs (2019–2022)', 'Visual Designer — Paper Crane (2016–2019)'] },
          { heading: 'Skills', bullets: ['React / TypeScript', 'Motion + micro-interactions', 'Design systems', 'Prototyping (Figma, Framer)'] },
        ],
      },
      projects: {
        title: 'Projects Portfolio',
        sections: [
          { heading: 'Highlights', bullets: ['Interactive archive for ceramic artist', 'Specimen site for experimental typeface', 'Immersive tea ceremony web experience'] },
        ],
      },
      featured: {
        title: 'Featured Work',
        sections: [ { heading: 'Spotlight', bullets: ['Immersive storytelling microsite', 'Gallery-grade photography viewport'] } ],
      },
      cases: {
        title: 'Case Studies',
        sections: [ { heading: 'In-depth', bullets: ['Wayfinding redesign for museum', 'Narrative portfolio for illustrator'] } ],
      },
      writing: {
        title: 'Writing',
        sections: [ { heading: 'Essays', bullets: ['Designing for tactility online', 'Analog cues in digital products'] } ],
      },
      research: {
        title: 'Research',
        sections: [ { heading: 'Themes', bullets: ['Philatelic visual systems', 'Material cues in UX'] } ],
      },
      photo: {
        title: 'Photography',
        sections: [ { heading: 'Series', bullets: ['Quiet streets in Kyoto', 'Macro studies of paper fibers'] } ],
      },
      contact: {
        title: 'Contact',
        sections: [ { heading: 'Reach out', bullets: ['hello@yoshita.studio', 'LinkedIn · Dribbble · GitHub'] } ],
      },
    };

    const StampButton = ({ stamp, index, onClick, isAnimating }) => {
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setLoaded(true), 180 + index * 160);
        return () => clearTimeout(timer);
      }, [index]);

      const handleKeyDown = (e) => {
        if (isAnimating) return;
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          onClick(stamp.page);
        }
      };

      return (
        <button
          className={`stamp-button ${loaded ? 'loaded' : ''}`}
          aria-label={stamp.label}
          style={{
            top: stamp.position.top,
            left: stamp.position.left,
            width: stamp.width,
            zIndex: stamp.zIndex,
            '--rotation': `${stamp.rotation}deg`,
            animationDelay: `${0.15 + index * 0.18}s`,
          }}
          onClick={() => onClick(stamp.page)}
          onKeyDown={handleKeyDown}
          disabled={isAnimating}
        >
          <img src={stamp.image} alt={`${stamp.label} - Vintage Stamp`} className="stamp-image" loading="lazy" />
          <div className="stamp-tooltip">{stamp.label}</div>
        </button>
      );
    };

    const ProfileStamp = () => (
      <div className="profile-stamp" aria-hidden="true">
        <div className="profile-photo" />
      </div>
    );

    const InnerPage = ({ pageKey, onBack }) => {
      const data = PAGE_CONTENT[pageKey];
      if (!data) return null;
      return (
        <div className="inner-page">
          <button className="back-button" onClick={onBack} aria-label="Back to collection">
            <span aria-hidden>⟵</span>
            Back to Collection
          </button>
          <h2 className="title" style={{ marginTop: '16px', marginBottom: '8px' }}>{data.title}</h2>
          {data.sections.map((section, idx) => (
            <div key={idx} style={{ marginTop: idx === 0 ? 4 : 14 }}>
              <h3 className="section-title">{section.heading}</h3>
              {section.body && <p className="section-body">{section.body}</p>}
              {section.bullets && (
                <ul className="bullet-list">
                  {section.bullets.map((item, i) => <li key={i}>{item}</li>)}
                </ul>
              )}
            </div>
          ))}
        </div>
      );
    };

    const HomePage = ({ onSelect, isAnimating }) => (
      <div className="page-content">
        <h1 className="title">Yoshita's Portfolio</h1>
        <div className="layout">
          <ProfileStamp />
          <div className="stamp-field" aria-label="Stamp navigation area">
            {STAMPS.map((stamp, index) => (
              <StampButton key={stamp.id} stamp={stamp} index={index} onClick={onSelect} isAnimating={isAnimating} />
            ))}
          </div>
        </div>
      </div>
    );

    const App = () => {
      const [currentPage, setCurrentPage] = useState('home');
      const [isAnimating, setIsAnimating] = useState(false);
      const [direction, setDirection] = useState('forward');

      const startTurn = (nextPage, dir) => {
        if (isAnimating || currentPage === nextPage) return;
        setDirection(dir);
        setIsAnimating(true);
        setTimeout(() => setCurrentPage(nextPage), 260);
        setTimeout(() => setIsAnimating(false), 660);
      };

      const handleSelect = (page) => startTurn(page, 'forward');
      const handleBack = () => startTurn('home', 'backward');

      return (
        <div className="album" role="main">
          <div className={`page ${isAnimating ? `turning ${direction}` : ''}`} aria-live="polite">
            {currentPage === 'home' ? (
              <HomePage onSelect={handleSelect} isAnimating={isAnimating} />
            ) : (
              <InnerPage pageKey={currentPage} onBack={handleBack} />
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
