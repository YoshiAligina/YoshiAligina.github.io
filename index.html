<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="layout">
        <section class="intro">
            <header class="intro-header">
                <h1>yoshi</h1>
                <p>hover over a stamp !</p>
            </header>

            <div class="photo-wrap">
                <img src="images/yoshipfp.png" alt="Yoshita Aligina">
            </div>

            <p class="caption">my name is yoshita aligina (yoshi).</p>

            <div class="statement">
                <p>i'm an incoming data management professional @ <span>bloomberg</span>.</p>
                <p>i study data sci, comp sci, stats, and phil @ <span>rutgers</span></p>
            </div>
        </section>

        <section class="stamp-collage" aria-label="Postage stamp collage">
            <img class="stamp stamp-1" src="images/S1.png" alt="Decorative stamp 1">
            <img class="stamp stamp-2" src="images/S2.png" alt="Decorative stamp 2">
            <img class="stamp stamp-3" src="images/S3.png" alt="Decorative stamp 3">
            <img class="stamp stamp-4" src="images/S4.png" alt="Decorative stamp 4">
            <img class="stamp stamp-5" src="images/S5.png" alt="Decorative stamp 5">
            <img class="stamp stamp-6" src="images/S6.png" alt="Decorative stamp 6">
            <img class="stamp stamp-7" src="images/s7.png" alt="Decorative stamp 7">
            <img class="stamp stamp-8" src="images/s8.png" alt="Decorative stamp 8">
            <img class="stamp stamp-9" src="images/s9.png" alt="Decorative stamp 9">
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
