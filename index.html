<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshi</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="editorial">
        <header class="intro-header">
            <h1>yoshi</h1>
            <p>drag the stamps around !</p>
        </header>

        <div class="hero">
            <div class="photo-wrap">
                <img src="images/yoshipfp.png" alt="Yoshita Aligina">
            </div>

            <div class="statement" id="statement">
                <p>my name is <span class="accent">yoshita aligina</span> (yoshi). i'm an incoming data management professional @ <span class="accent">bloomberg</span>. i study data sci, comp sci, stats, and phil @ <span class="accent">rutgers</span></p>
            </div>
        </div>

        <img class="stamp stamp-1" src="images/S1.png" alt="Decorative stamp 1" data-depth="1.2">
        <img class="stamp stamp-2" src="images/S2.png" alt="Decorative stamp 2" data-depth="0.6">
        <img class="stamp stamp-3" src="images/S3.png" alt="Decorative stamp 3" data-depth="0.9">
        <img class="stamp stamp-4" src="images/S4.png" alt="Decorative stamp 4" data-depth="1.4">
        <img class="stamp stamp-5" src="images/S5.png" alt="Decorative stamp 5" data-depth="0.7">
        <img class="stamp stamp-6" src="images/S6.png" alt="Decorative stamp 6" data-depth="1.1">
        <a class="stamp-link stamp-7-link" href="about.html" aria-label="About me" data-depth="0.5">
            <img class="stamp stamp-7" src="images/s7.png" alt="About me stamp">
            <span class="stamp-hover-label">about me</span>
        </a>
        <a class="stamp-link stamp-8-link" href="https://www.linkedin.com/in/yoshitaaligina/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" data-depth="0.8">
            <img class="stamp stamp-8" src="images/s8.png" alt="LinkedIn stamp">
            <span class="stamp-hover-label">linkedin</span>
        </a>
        <a class="stamp-link stamp-9-link" href="https://docs.google.com/document/d/1sLyOLnfKQ4cF6L6sdd2yjP68HnDcfu0jtBPwLNmwqG8/edit?tab=t.0" target="_blank" rel="noopener noreferrer" aria-label="Resume" data-depth="1.0">
            <img class="stamp stamp-9" src="images/s9.png" alt="Resume stamp">
            <span class="stamp-hover-label">resume</span>
        </a>
    </main>

    <script src="main.js"></script>
</body>
</html>
